name: CI & Deploy

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root quality dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run quality gate
        run: npm run quality

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: nerdle-production
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

          cat <<EOF > ~/.ssh/config
          Host lightsail
            HostName ${{ secrets.LIGHTSAIL_HOST }}
            User ${{ secrets.LIGHTSAIL_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking=yes
          EOF

      - name: Deploy to Lightsail
        run: |
          ssh lightsail "bash ~/deploy-scripts/deploy-nerdle.sh"

      - name: Health check (client + server)
        run: |
          echo "Waiting for services to start..."
          sleep 8

          echo "Checking client..."
          curl -f https://${{ secrets.APP_DOMAIN }} || {
            echo "Client health check failed"
            exit 1
          }

          echo "Checking server..."
          curl -f https://${{ secrets.APP_DOMAIN }}/api/health || {
            echo "Server health check failed"
            exit 1
          }

          echo "Deploy health check passed"
