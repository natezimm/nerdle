name: CI & Deploy

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      # ---------- Root quality tooling ----------
      - name: Install root deps
        run: npm ci

      # ---------- Client (React) ----------
      - name: Install client deps
        working-directory: client
        run: npm ci

      # ---------- Server (Node.js) ----------
      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Client tests + coverage
        working-directory: client
        run: npm test -- --run

      - name: Server tests + coverage
        working-directory: server
        run: npm test

      - name: Client production build
        working-directory: client
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: nerdle-production
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

          cat <<EOF > ~/.ssh/config
          Host lightsail
            HostName ${{ secrets.LIGHTSAIL_HOST }}
            User ${{ secrets.LIGHTSAIL_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking=yes
          EOF

      - name: Deploy to Lightsail
        run: |
          ssh lightsail "bash ~/deploy-scripts/deploy-nerdle.sh"

      - name: Health check (client + server)
        run: |
          echo "⏳ Waiting for services to start..."
          sleep 8

          echo "🔍 Checking client..."
          curl -f https://${{ secrets.APP_DOMAIN }} || {
            echo "❌ Client health check failed"
            exit 1
          }

          echo "🔍 Checking server..."
          curl -f https://${{ secrets.APP_DOMAIN }}/api/health || {
            echo "❌ Server health check failed"
            exit 1
          }

          echo "✅ Deploy health check passed"
